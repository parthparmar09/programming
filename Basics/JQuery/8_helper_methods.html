<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button id="btn1">serialize</button><button id="btn2">serialize array</button>
    <hr>
    <form >
      <select name="single">
        <option>Single</option>
        <option>Single2</option>
      </select>

      <br />
      <select name="multiple" multiple="multiple">
        <option selected="selected">Multiple1</option>
        <option>Multiple2</option>
        <option selected="selected">Multiple3</option>
      </select>

      <br />
      <input type="checkbox" name="check" value="check1" id="ch1" />
      <label for="ch1">check1</label>
      <input
        type="checkbox"
        name="check"
        value="check2"
        checked="checked"
        id="ch2"
      />
      <label for="ch2">check2</label>

      <br />
      <input
        type="radio"
        name="radio"
        value="radio1"
        checked="checked"
        id="r1"
      />
      <label for="r1">radio1</label>
      <input type="radio" name="radio" value="radio2" id="r2" />
      <label for="r2">radio2</label>
    </form>

    <p id="results"></p>
  </body>
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
    integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  ></script>
  <script>
    var myObject = {
      a: {
        one: 1,
        two: 2,
        three: 3,
      },
      b: [1, 2, 3],
    };
    var encoded = $.param(myObject);
    var decoded = decodeURIComponent($.param(myObject));

    console.log(encoded, decoded);

    function serializeValues() {
      var str = $("form").serialize();
      console.log(str);
    }

    function serializeArrayValues() {
    var fields = $( "form" ).serializeArray();
    console.log(fields);
  }
 

    $('#btn1').click(serializeValues);
    $('#btn2').click(serializeArrayValues);
  </script>
</html>
