<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Events and Effects</title>
  </head>
  <body>
    <h1>Events and Effects</h1>
    <div class="container" id="cont1">ONE</div>

    <div id="button-coll">
      <div class="button-cont" id="show-btns">
        <h3>Show Buttons</h3>
        <button class="btn" id="btn1">Show</button
        ><button class="btn" id="btn2">Hide</button
        ><button class="btn" id="btn3">Toggle</button>
      </div>
      <div class="button-cont" id="fade-btns">
        <h3>Fade Buttons</h3>
        <button class="btn" id="btn4">FadeIn</button
        ><button class="btn" id="btn5">FadeOut</button
        ><button class="btn" id="btn6">FadeToggle</button>
      </div>
      <div class="button-cont" id="slide-btns">
        <h3>Slide Buttons</h3>
        <button class="btn" id="btn7">SlideDown</button
        ><button class="btn" id="btn8">SlideUp</button
        ><button class="btn" id="btn9">SlideToggle</button>
      </div>
    </div>
  </body>
  <style>
    .container {
      border: 1px solid black;
      background-color: lightblue;
      height: 100px;
      width: 100px;
    }

    #button-coll{
        display: flex;
        justify-content: space-evenly;
        align-items: center;
    }

    .button-cont{
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .btn{
        cursor: pointer;
        background-color: lightcoral;
        margin: 1px;
        padding: 5px;
    }
  </style>
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
    integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  ></script>
  <script src='http://ajax.googleapis.com/ajax/libs/jqueryui/1.8.5/jquery-ui.min.js'></script>
  <script>

    const div1 = $('#cont1');

    $(".btn").hover(function(){
        const style = {
            "background-color" : "lightyellow",
            "transform" : "scaleX(1.1)"
        }
        $(this).css(style);
    } ,function (){
        const style = {
            "background-color" : "lightcoral",
            "transform" : "scaleX(1)"
        }
        $(this).css(style);
    })
    $("#btn1").click((e)=>{
        console.log(e);
        div1.show(1000, 'linear' , ()=>{
            console.log(this);
        });
    })
    $("#btn2").click((e)=>{
        div1.hide(1000, 'swing' , ()=>{
            console.log("hidden");

        });
    })
    $("#btn3").click((e)=>{
        div1.toggle(1000, 'easeInOutQuint' , ()=>{
            console.log("toggled");

        });
    })
    $("#btn4").click((e)=>{
        div1.fadeIn(1000, 'easeInQuad' , ()=>{
            console.log("fadded in");
        });
    })
    $("#btn5").click((e)=>{
        div1.fadeOut(1000, 'easeOutQuad' , ()=>{
            console.log("fadded out");
        });
    })
    $("#btn6").click((e)=>{
        div1.fadeToggle(1000, 'easeInOutQuad' , ()=>{
            console.log("fade toggled");
        });
    })
    $("#btn7").click((e)=>{
        div1.slideDown(1000, 'easeInQuint' , ()=>{
            console.log("slided down");
        });
    })
    $("#btn8").click((e)=>{
        div1.slideUp(1000, 'easeOutQuint' , ()=>{
            console.log("slided up");
        });
    })
    $("#btn9").click((e)=>{
        div1.slideToggle(1000, 'easeInOutQuad' , ()=>{
            console.log("slide toggled");
        });
    })
  </script>
</html>
