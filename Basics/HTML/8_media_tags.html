<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Media Tags</title>
  </head>
  <body>
    <!-- <style>
        *{
            border: 1px solid black;
        }
    </style>     -->

    <h1>HTML Media Tags</h1>
    <img
      src="gateway.jpg"
      alt="gateway"
      title="Gateway"
      height="100"
      width="100"
    />
    <audio src="sample_audio.mp3" autoplay controls muted loop>Sample Audio</audio>
    <video
      src="sample_video.mp4"
      controls
      muted
      poster="gateway.jpg"
      loop
      height="300"
      width="500"
    >
      Sample Video
    </video>
    <iframe src="5_lists.html" frameborder="0" height="300" width="500"></iframe>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/wxSKDxQedhs?si=B6pV5XpdTWRhfWaI"
      title="YouTube video player"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      allowfullscreen
    ></iframe>
  </body>
</html>
