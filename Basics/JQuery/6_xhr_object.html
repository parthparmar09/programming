<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button id="getBtn">Display</button>
    <button id="postBtn">Send Data</button>
    <div class="container"></div>
  </body>
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
    integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  ></script>
  <script>
    $(document).ready(function () {
      //for get request
      function getData() {
        const xhr = new XMLHttpRequest();

        xhr.onload = function () {
          if (xhr.status === 200) {
            var response = xhr.responseText;
            res = JSON.parse(response);
            console.log(res.data);
            populateData(res.data);
          } else {
            const dataStr = `<div><h3>${xhr.status}.${xhr.statusText}---${xhr.responseText}</h3></div>`;

            $(".container").html(dataStr);
          }
        };
        xhr.open("GET", "https://dummy.restapiexample.com/api/v1/employees");
        xhr.onreadystatechange = function () {
          console.log(this.readyState);
        };

        xhr.send();
      }

      function populateData(data) {
        let dataStr = "";
        data.forEach((item) => {
          dataStr += `<div><h3>${item.id}.${item.employee_name}</h3></div>`;
        });

        $(".container").html(dataStr);
      }

      //for post request
      function postData() {
        const xhr = new XMLHttpRequest();

        xhr.onload = function () {
          const dataStr = `<div><h3>${xhr.status}.${xhr.statusText}---${xhr.responseText}</h3></div>`;

          $(".container").html(dataStr);
        };

        xhr.onprogress = function (e) {
          if(e.lengthComputable){
            console.log(e.total, e.loaded);
          }else{
            console.log("not computable");
          }
        }
        xhr.open("POST", "https://dummy.restapiexample.com/api/v1/create");
        const data = {
          name : "SomeNameBiach",
          salary : 1212121212,
          age : 11
        }

        xhr.send(data);
      }
      $("#getBtn").click(getData);
      $("#postBtn").click(postData);
    });
  </script>
</html>
